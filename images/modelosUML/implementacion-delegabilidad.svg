<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1046px" preserveAspectRatio="none" style="width:985px;height:1046px;background:#FFFFFF;" version="1.1" viewBox="0 0 985 1046" width="985px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="360" x="305.75" y="24.9659">Patr&#243;n de delegabilidad &#8212; Implementaci&#243;n (paso 7)</text><ellipse cx="388.5" cy="56.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><g id="Esqueleto"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="397" x="190" y="211.5679"/><line style="stroke:#424242;stroke-width:0.5;" x1="190" x2="587" y1="240.6358" y2="240.6358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227" x="275" y="231.5339">I1 &#8212; Implementar la arquitectura</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159" x="195" y="258.4639">orquestador &#8212; no delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="377" x="195" y="274.808">identifica componentes clave y confirma mapa componente &#8594; nodo</text></g><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="348.5" y="410.8279"/><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="348.5" y="612.5879"/><g id="ComponenteI"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="231" x="7" y="479.8279"/><line style="stroke:#424242;stroke-width:0.5;" x1="7" x2="238" y1="508.8958" y2="508.8958"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162" x="41.5" y="499.7939">Agente &#8212; componente i</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161" x="12" y="526.7239">becario &#8212; delegable (I3 + I4)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="211" x="12" y="543.068">implementar clase &#183; prueba de unidad</text></g><g id="ComponenteJ"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="231" x="273" y="479.8279"/><line style="stroke:#424242;stroke-width:0.5;" x1="273" x2="504" y1="508.8958" y2="508.8958"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162" x="307.5" y="499.7939">Agente &#8212; componente j</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161" x="278" y="526.7239">becario &#8212; delegable (I3 + I4)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="211" x="278" y="543.068">implementar clase &#183; prueba de unidad</text></g><g id="ComponenteN"><rect fill="#FEFEFE" height="50" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="50" x="538.5" y="490.7079"/><line style="stroke:#424242;stroke-width:0.5;" x1="538.5" x2="588.5" y1="519.7758" y2="519.7758"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="12" x="557.5" y="510.6739">...</text></g><path d="M152.5,691.4679 L624.5,691.4679 A12.5,12.5 0 0 1 637,703.9679 L637,720.5358 L140,720.5358 L140,703.9679 A12.5,12.5 0 0 1 152.5,691.4679 " fill="#FEFEFE" style="stroke:#FEFEFE;stroke-width:1.0;"/><rect fill="none" height="255.8279" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="497" x="140" y="691.4679"/><line style="stroke:#424242;stroke-width:0.5;" x1="140" x2="637" y1="720.5358" y2="720.5358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154" x="311.5" y="711.4339">I2 &#8212; Integrar sistemas</text><ellipse cx="305" cy="741.5358" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><g id="I2.Construccion"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="306" x="152" y="788.5358"/><line style="stroke:#424242;stroke-width:0.5;" x1="152" x2="458" y1="817.6038" y2="817.6038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="88" x="261" y="808.5018">Construcci&#243;n</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="248" x="157" y="835.4318">compilar y enlazar componentes disponibles</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="286" x="157" y="851.776">orden por capas &#8212; lo que sostiene a otros, primero</text></g><ellipse cx="305" cy="926.2958" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="305" cy="926.2958" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><!--link *start*I2 to Construccion--><g id="link_*start*I2_Construccion"><path d="M305,751.8158 C305,760.7758 305,768.9258 305,782.2858 " fill="none" id="*start*I2-to-Construccion" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="305,788.2858,309,779.2858,305,783.2858,301,779.2858,305,788.2858" style="stroke:#616161;stroke-width:1.0;"/></g><!--link Construccion to Construccion--><g id="link_Construccion_Construccion"><path d="M458.37,816.9358 C469.31,818.6258 476,821.1258 476,824.4158 C476,827.7058 475.2388,829.2845 464.2988,830.9845 " fill="none" id="Construccion-to-Construccion" style="stroke:#616161;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><polygon fill="#616161" points="458.37,831.9058,467.8775,834.4764,463.3107,831.1381,466.6491,826.5713,458.37,831.9058" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135" x="484.5" y="820.8128">siguiente construcci&#243;n</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140" x="482" y="838.5189">[quedan componentes]</text></g><!--link Construccion to *end*I2--><g id="link_Construccion_*end*I2"><path d="M305,860.6358 C305,879.9558 305,896.4958 305,909.2158 " fill="none" id="Construccion-to-*end*I2" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="305,915.2158,309,906.2158,305,910.2158,301,906.2158,305,915.2158" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172" x="306" y="893.1928">sistema ejecutable integrado</text></g><ellipse cx="388.5" cy="1029.1779" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="388.5" cy="1029.1779" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><g id="elem_GMN27"><path d="M621.5,145.0679 L621.5,243.4479 L587.42,247.4479 L621.5,251.4479 L621.5,349.8341 A0,0 0 0 0 621.5,349.8341 L943.5,349.8341 A0,0 0 0 0 943.5,349.8341 L943.5,155.0679 L933.5,145.0679 L621.5,145.0679 A0,0 0 0 0 621.5,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M933.5,145.0679 L933.5,155.0679 L943.5,155.0679 L933.5,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="301" x="627.5" y="163.9649">Criterio de entrada: modelo de dise&#241;o del ramillete</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274" x="627.5" y="181.6709">(clases con tecnolog&#237;a, secuencias), modelo de</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242" x="627.5" y="199.377">despliegue y pausa post-dise&#241;o resuelta.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="627.5" y="217.083">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246" x="627.5" y="234.789">I1 es la pausa de menor peso del pipeline:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228" x="627.5" y="252.495">el stack ya est&#225; fijado; solo se confirma</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166" x="627.5" y="270.201">el mapa componente-nodo.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="627.5" y="287.907">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="627.5" y="305.6131">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="627.5" y="323.3191">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="627.5" y="341.0251">las tres regiones del espacio de gobierno.</text></g><g id="elem_GMN30"><path d="M672.5,681.5879 L672.5,815.3779 L637.3,819.3779 L672.5,823.3779 L672.5,957.1782 A0,0 0 0 0 672.5,957.1782 L978.5,957.1782 A0,0 0 0 0 978.5,957.1782 L978.5,691.5879 L968.5,681.5879 L672.5,681.5879 A0,0 0 0 0 672.5,681.5879 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M968.5,681.5879 L968.5,691.5879 L978.5,691.5879 L968.5,681.5879 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207" x="678.5" y="700.4849">I2 no es un join pasivo: es el n&#250;cleo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144" x="678.5" y="718.1909">no trivial de la disciplina.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254" x="678.5" y="735.897">Las construcciones se integran por capas e</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274" x="678.5" y="753.603">incrementalmente &#8212; pueden solaparse con I3</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250" x="678.5" y="771.309">mientras los agentes siguen produciendo.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260" x="678.5" y="789.015">La compilaci&#243;n conjunta es el test m&#225;s duro</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195" x="678.5" y="806.721">de que la orquestaci&#243;n funcion&#243;.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="678.5" y="824.427">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285" x="678.5" y="842.1331">Criterio de salida: componentes implementados</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279" x="678.5" y="859.8391">y probados como unidades, sistema ejecutable</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="188" x="678.5" y="877.5451">que compila y pasa integraci&#243;n.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="678.5" y="895.2511">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="678.5" y="912.9571">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="678.5" y="930.6631">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="678.5" y="948.3692">las tres regiones del espacio de gobierno.</text></g><!--link *start* to Esqueleto--><g id="link_*start*_Esqueleto"><path d="M388.5,66.4579 C388.5,92.5079 388.5,160.6679 388.5,205.2579 " fill="none" id="*start*-to-Esqueleto" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="388.5,211.2579,392.5,202.2579,388.5,206.2579,384.5,202.2579,388.5,211.2579" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63" x="389.5" y="110.9649">pausa [go]</text></g><!--link Esqueleto to fork--><g id="link_Esqueleto_fork"><path d="M388.5,283.5179 C388.5,326.3779 388.5,389.1279 388.5,404.6479 " fill="none" id="Esqueleto-to-fork" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="388.5,410.6479,392.5,401.6479,388.5,405.6479,384.5,401.6479,388.5,410.6479" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to ComponenteI--><g id="link_fork_ComponenteI"><path d="M379.34,419.2379 C353.81,428.7279 285.2341,454.2175 223.1141,477.3075 " fill="none" id="fork-to-ComponenteI" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="217.49,479.3979,227.3197,480.0116,222.1767,477.6559,224.5324,472.5129,217.49,479.3979" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to ComponenteJ--><g id="link_fork_ComponenteJ"><path d="M388.5,419.1179 C388.5,428.5079 388.5,450.2079 388.5,473.3979 " fill="none" id="fork-to-ComponenteJ" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="388.5,479.3979,392.5,470.3979,388.5,474.3979,384.5,470.3979,388.5,479.3979" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to ComponenteN--><g id="link_fork_ComponenteN"><path d="M397.61,419.3079 C419.75,427.9479