<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1134px" preserveAspectRatio="none" style="width:1091px;height:1134px;background:#FFFFFF;" version="1.1" viewBox="0 0 1091 1134" width="1091px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="302" x="387.5" y="24.9659">Patr&#243;n de delegabilidad &#8212; Pruebas (paso 8)</text><ellipse cx="532.5" cy="56.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><g id="Esqueleto"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="367" x="349" y="185.0079"/><line style="stroke:#424242;stroke-width:0.5;" x1="349" x2="716" y1="214.0758" y2="214.0758"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170" x="447.5" y="204.9739">T1 &#8212; Planificar la prueba</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159" x="354" y="231.9039">orquestador &#8212; no delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="347" x="354" y="248.248">estrategia &#183; alcance &#183; criterios de aceptaci&#243;n &#183; orden de prueba</text></g><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="492.5" y="357.7179"/><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="492.5" y="559.4679"/><g id="AgenteI"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="327" x="7" y="426.7179"/><line style="stroke:#424242;stroke-width:0.5;" x1="7" x2="334" y1="455.7858" y2="455.7858"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157" x="92" y="446.6839">Agente &#8212; caso de uso i</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167" x="12" y="473.6139">becario &#8212; delegable (T2 + T3)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="307" x="12" y="489.958">dise&#241;ar casos de prueba &#183; implementar automatizaci&#243;n</text></g><g id="AgenteJ"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="327" x="369" y="426.7179"/><line style="stroke:#424242;stroke-width:0.5;" x1="369" x2="696" y1="455.7858" y2="455.7858"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157" x="454" y="446.6839">Agente &#8212; caso de uso j</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167" x="374" y="473.6139">becario &#8212; delegable (T2 + T3)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="307" x="374" y="489.958">dise&#241;ar casos de prueba &#183; implementar automatizaci&#243;n</text></g><g id="AgenteN"><rect fill="#FEFEFE" height="50" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="50" x="730.5" y="437.5879"/><line style="stroke:#424242;stroke-width:0.5;" x1="730.5" x2="780.5" y1="466.6558" y2="466.6558"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="12" x="749.5" y="457.5539">...</text></g><path d="M384.75,628.4679 L680.25,628.4679 A12.5,12.5 0 0 1 692.75,640.9679 L692.75,657.5358 L372.25,657.5358 L372.25,640.9679 A12.5,12.5 0 0 1 384.75,628.4679 " fill="#FEFEFE" style="stroke:#FEFEFE;stroke-width:1.0;"/><rect fill="none" height="416.9279" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="320.5" x="372.25" y="628.4679"/><line style="stroke:#424242;stroke-width:0.5;" x1="372.25" x2="692.75" y1="657.5358" y2="657.5358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158" x="453.5" y="648.4339">T4 &#8212; Ejecutar y evaluar</text><ellipse cx="530.75" cy="678.5358" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><g id="T4.Ejecutar"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="267" x="397.25" y="725.5358"/><line style="stroke:#424242;stroke-width:0.5;" x1="397.25" x2="664.25" y1="754.6038" y2="754.6038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55" x="503.25" y="745.5018">Ejecutar</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115" x="402.25" y="772.4318">becario &#8212; delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="247" x="402.25" y="788.776">ejecutar pruebas sobre el sistema integrado</text></g><g id="T4.Moderar"><rect fill="#FEFEFE" height="88.1003" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="293" x="384.25" y="870.2958"/><line style="stroke:#424242;stroke-width:0.5;" x1="384.25" x2="677.25" y1="899.3638" y2="899.3638"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="58" x="501.75" y="890.2618">Moderar</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="233" x="389.25" y="917.1918">orquestador &#8212; no delegable (moderador)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="225" x="389.25" y="933.536">atribuir defecto a su origen aguas arriba</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="273" x="389.25" y="949.8801">decidir correcci&#243;n local o registro para milestone</text></g><ellipse cx="530.75" cy="1024.3958" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="530.75" cy="1024.3958" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><!--link *start*T4 to Ejecutar--><g id="link_*start*T4_Ejecutar"><path d="M530.75,688.8158 C530.75,697.7758 530.75,705.9258 530.75,719.2858 " fill="none" id="*start*T4-to-Ejecutar" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="530.75,725.2858,534.75,716.2858,530.75,720.2858,526.75,716.2858,530.75,725.2858" style="stroke:#616161;stroke-width:1.0;"/></g><!--link Ejecutar to Moderar--><g id="link_Ejecutar_Moderar"><path d="M529.23,797.6858 C529.03,803.5658 528.86,809.5958 528.75,815.2958 C528.44,831.7358 528.48,835.8558 528.75,852.2958 C528.84,858.0258 528.8287,858.048 528.9887,863.998 " fill="none" id="Ejecutar-to-Moderar" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="529.15,869.9958,532.9066,860.8916,529.0156,864.9976,524.9095,861.1066,529.15,869.9958" style="stroke:#616161;stroke-width:1.0;"/></g><!--link Moderar to Ejecutar--><g id="link_Moderar_Ejecutar"><path d="M530.75,869.8958 C530.75,846.8958 530.75,825.0158 530.75,803.4258 " fill="none" id="Moderar-to-Ejecutar" style="stroke:#616161;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><polygon fill="#616161" points="530.75,797.4258,526.75,806.4258,530.75,802.4258,534.75,806.4258,530.75,797.4258" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120" x="547.25" y="830.1928">corregir y reejecutar</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151" x="531.75" y="847.8989">[quedan defectos locales]</text></g><!--link Moderar to *end*T4--><g id="link_Moderar_*end*T4"><path d="M530.75,958.6758 C530.75,978.6358 530.75,994.6258 530.75,1007.1458 " fill="none" id="Moderar-to-*end*T4" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="530.75,1013.1458,534.75,1004.1458,530.75,1008.1458,526.75,1004.1458,530.75,1013.1458" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107" x="531.75" y="991.2928">ramillete en verde</text></g><ellipse cx="532.5" cy="1117.3979" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="532.5" cy="1117.3979" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><g id="elem_GMN29"><path d="M751,145.0679 L751,216.8879 L716.35,220.8879 L751,224.8879 L751,296.716 A0,0 0 0 0 751,296.716 L1084,296.716 A0,0 0 0 0 1084,296.716 L1084,155.0679 L1074,145.0679 L751,145.0679 A0,0 0 0 0 751,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M1074,145.0679 L1074,155.0679 L1084,155.0679 L1074,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304" x="757" y="163.9649">Criterio de entrada: sistema ejecutable que compila</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312" x="757" y="181.6709">y pasa integraci&#243;n de construcciones, CU con detalle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224" x="757" y="199.377">y prototipo, RNF acumulados y pausa</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182" x="757" y="217.083">post-implementaci&#243;n resuelta.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="757" y="234.789">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="757" y="252.495">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="757" y="270.201">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="757" y="287.907">las tres regiones del espacio de gobierno.</text></g><g id="elem_GMN32"><path d="M727.5,707.9879 L727.5,832.9379 L693.14,836.9379 L727.5,840.9379 L727.5,965.8721 A0,0 0 0 0 727.5,965.8721 L1043.5,965.8721 A0,0 0 0 0 1043.5,965.8721 L1043.5,717.9879 L1033.5,707.9879 L727.5,707.9879 A0,0 0 0 0 727.5,707.9879 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M1033.5,707.9879 L1033.5,717.9879 L1043.5,717.9879 L1033.5,707.9879 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247" x="733.5" y="726.8849">T4 no es un join pasivo: es topolog&#237;a cycle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295" x="733.5" y="744.5909">con moderador. Solo el moderador (orquestador)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236" x="733.5" y="762.297">atribuye el defecto y decide si se corrige</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210" x="733.5" y="780.003">aqu&#237; o se registra para el milestone.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228" x="733.5" y="797.709">Las vueltas del ciclo (ejecutar, corregir)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232" x="733.5" y="815.415">son delegables; la moderaci&#243;n no lo es.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="733.5" y="833.121">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236" x="733.5" y="850.827">Criterio de salida: ramillete verificado en</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251" x="733.5" y="868.5331">integraci&#243;n y sistema, defectos atribuidos,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213" x="733.5" y="886.2391">pruebas en verde en lo que es suyo.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="733.5" y="903.9451">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="733.5" y="921.6511">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="733.5" y="939.3571">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="733.5" y="957.0631">las tres regiones del espacio de gobierno.</text></g><!--link *start* to Esqueleto--><g id="link_*start*_Esqueleto"><path d="M532.5,66.2879 C532.5,88.6179 532.5,140.5779 532.5,178.5679 " fill="none" id="*start*-to-Esqueleto" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="532.5,184.5679,536.5,175.5679,532.5,179.5679,528.5,175.5679,532.5,184.5679" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63" x="533.5" y="110.9649">pausa [go]</text></g><!--link Esqueleto to fork--><g id="link_Esqueleto_fork"><path d="M532.5,256.9179 C532.5,292.2679 532.5,337.5179 532.5,351.2279 " fill="none" id="Esqueleto-to-fork" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="532.5,357.2279,536.5,348.2279,532.5,352.2279,528.5,348.2279,532.5,357.2279" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteI--><g id="link_fork_AgenteI"><path d="M520.04,366.1179 C485.29,375.6079 390.108,401.6071 305.5