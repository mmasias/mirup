<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1258px" preserveAspectRatio="none" style="width:1001px;height:1258px;background:#FFFFFF;" version="1.1" viewBox="0 0 1001 1258" width="1001px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="299" x="344" y="24.9659">Patr&#243;n de delegabilidad &#8212; An&#225;lisis (paso 5)</text><ellipse cx="450" cy="56.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><g id="Esqueleto"><rect fill="#FEFEFE" height="104.4444" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="275" x="312.5" y="257.1979"/><line style="stroke:#424242;stroke-width:0.5;" x1="312.5" x2="587.5" y1="286.2658" y2="286.2658"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66" x="417" y="277.1639">Esqueleto</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159" x="317.5" y="304.0939">orquestador &#8212; no delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="164" x="317.5" y="320.438">A1 &#8212; Analizar la arquitectura</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="255" x="317.5" y="336.7822">esqueleto MV* (Vista &#183; Controladora &#183; Modelo)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="240" x="317.5" y="353.1263">paquetes de an&#225;lisis &#183; requisitos especiales</text></g><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="410" y="534.7679"/><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="410" y="736.5279"/><g id="AgenteCUI"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="272" x="7" y="603.7679"/><line style="stroke:#424242;stroke-width:0.5;" x1="7" x2="279" y1="632.8358" y2="632.8358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157" x="64.5" y="623.7339">Agente &#8212; caso de uso i</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="169" x="12" y="650.6639">becario &#8212; delegable (A2 + A3)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="252" x="12" y="667.008">analizar CU &#183; completar clases que participan</text></g><g id="AgenteCUJ"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="272" x="314" y="603.7679"/><line style="stroke:#424242;stroke-width:0.5;" x1="314" x2="586" y1="632.8358" y2="632.8358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157" x="371.5" y="623.7339">Agente &#8212; caso de uso j</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="169" x="319" y="650.6639">becario &#8212; delegable (A2 + A3)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="252" x="319" y="667.008">analizar CU &#183; completar clases que participan</text></g><g id="AgenteCUN"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="229" x="621.5" y="603.7679"/><line style="stroke:#424242;stroke-width:0.5;" x1="621.5" x2="850.5" y1="632.8358" y2="632.8358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="12" x="730" y="623.7339">...</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115" x="626.5" y="650.6639">becario &#8212; delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209" x="626.5" y="667.008">(un agente por cada CU del ramillete)</text></g><g id="Integracion"><rect fill="#FEFEFE" height="88.1003" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="259" x="320.5" y="943.5379"/><line style="stroke:#424242;stroke-width:0.5;" x1="320.5" x2="579.5" y1="972.6058" y2="972.6058"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="78" x="411" y="963.5039">Integracion</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159" x="325.5" y="990.4339">orquestador &#8212; no delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="134" x="325.5" y="1006.778">A4 &#8212; Analizar paquetes</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="239" x="325.5" y="1023.1222">cohesi&#243;n, acoplamiento y estructura global</text></g><ellipse cx="450" cy="1241.6479" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="450" cy="1241.6479" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><g id="elem_GMN21"><path d="M622,145.0679 L622,305.4179 L587.75,309.4179 L622,313.4179 L622,473.7762 A0,0 0 0 0 622,473.7762 L994,473.7762 A0,0 0 0 0 994,473.7762 L994,155.0679 L984,145.0679 L622,145.0679 A0,0 0 0 0 622,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M984,145.0679 L984,155.0679 L994,155.0679 L984,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180" x="628" y="163.9649">Criterio de entrada de An&#225;lisis:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314" x="628" y="181.6709">casos de uso del ramillete priorizados y especificados</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303" x="628" y="199.377">(detalle + prototipo + estructuraci&#243;n completados),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351" x="628" y="217.083">modelo del dominio, requisitos no funcionales acumulados</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282" x="628" y="234.789">y pausa arquitect&#243;nica post-requisitos resuelta.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="628" y="252.495">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321" x="628" y="270.201">A1 fija el esqueleto MV* antes de entrar caso por caso:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337" x="628" y="287.907">una Vista por actor humano, un Controlador por caso de</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="329" x="628" y="305.6131">uso, Modelos por trazabilidad con el dominio. Identifica</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272" x="628" y="323.3191">paquetes y requisitos especiales (persistencia,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316" x="628" y="341.0251">concurrencia, seguridad) que se gestionan en dise&#241;o.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="628" y="358.7311">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137" x="628" y="376.4371">Sin esqueleto validado,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209" x="628" y="394.1431">ning&#250;n agente entra en derivaci&#243;n.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="628" y="411.8492">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="628" y="429.5552">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="628" y="447.2612">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="628" y="464.9672">las tres regiones del espacio de gobierno.</text></g><g id="elem_GMN24"><path d="M614.5,805.5279 L614.5,983.5879 L579.82,987.5879 L614.5,991.5879 L614.5,1169.6482 A0,0 0 0 0 614.5,1169.6482 L965.5,1169.6482 A0,0 0 0 0 965.5,1169.6482 L965.5,815.5279 L955.5,805.5279 L614.5,805.5279 A0,0 0 0 0 614.5,805.5279 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M955.5,805.5279 L955.5,815.5279 L965.5,815.5279 L955.5,805.5279 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167" x="620.5" y="824.4249">Criterio de salida de An&#225;lisis:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285" x="620.5" y="842.1309">casos de uso del ramillete analizados (clases con</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330" x="620.5" y="859.837">responsabilidades, atributos y relaciones completados),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268" x="620.5" y="877.543">arquitectura de paquetes definida y revisada,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269" x="620.5" y="895.249">requisitos especiales capturados para dise&#241;o,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293" x="620.5" y="912.955">trazabilidad completa clase - caso de uso - objeto.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302" x="620.5" y="930.661">Listo para la pausa arquitect&#243;nica que abre dise&#241;o.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="620.5" y="948.367">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283" x="620.5" y="966.0731">A3 no es fase separada: se ejecuta dentro de A2.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278" x="620.5" y="983.7791">Al analizar cada CU se completan las clases que</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279" x="620.5" y="1001.4851">participan en &#233;l; A4 consolida por convergencia</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276" x="620.5" y="1019.1911">en el diagrama de clases transversal, que crece</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111" x="620.5" y="1036.8971">con cada ramillete.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="620.5" y="1054.6031">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166" x="620.5" y="1072.3092">Sin integraci&#243;n completada,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="126" x="620.5" y="1090.0152">la disciplina no cierra.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="620.5" y="1107.7212">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="620.5" y="1125.4272">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="620.5" y="1143.1332">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="620.5" y="1160.8392">las tres regiones del espacio de gobierno.</text></g><!--link *start* to Esqueleto--><g id="link_*start*_Esqueleto"><path d="M450,66.3079 C450,96.7279 450,189.3079 450,250.8979 " fill="none" id="*start*-to-Esqueleto" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="450,256.8979,454,247.8979,450,251.8979,446,247.8979,450,256.8979" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63" x="451" y="110.9649">pausa [go]</text></g><!--link Esqueleto to fork--><g id="link_Esqueleto_fork"><path d="M450,362.0079 C450,422.2779 450,510.1279 450,528.5679 " fill="none" id="Esqueleto-to-fork" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="450,534.5679,454,525.5679,450,529.5679,446,525.5679,450,534.5679" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteCUI--><g id="link_fork_AgenteCUI"><path d="M439.43,543.1779 C409.96,552.6679 330.0412,578.4087 258.3412,601.4987 " fill="none" id="fork-to-AgenteCUI" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="252.63,603.3379,262.4229,604.3866,257.3893,601.8052,259.9706,596.7717,252.63,603.3379" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteCUJ--><g id="link_fork_AgenteCUJ"><path d="M450,543.0579 C450,552.4479 450,574.1479 450,597.3379 " fill="none" id="fork-to-AgenteCUJ" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="450,603.3379,454,594.3379,450,598.3379,446,594.3379,450,603.3379" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteCUN--><g id="link_fork_AgenteCUN"><path d="M459.84,543.1779 C487.3,552.6679 561.3993,578.2875 628.1893,601.3775 " fill="none" id="fork-to-AgenteCUN" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="633.86,603.3379,626.6609,596.6168,629.1344,601.7042,624.047,604.1778,633.86,603.3379" style="stroke:#616161;stroke-width:1.0;"/></g><!--link AgenteCUI to join--><g id="link_AgenteCUI_join"><path d="M252.53,675.9279 C324.17,698.9979 404.0487,724.7292 433.6187,734.2492 " fill="none" id="AgenteCUI-to-join" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="439.33,736.0879,431.9889,729.5223,434.5706,734.5556,429.5372,737.1373,439.33,736.0879" style="stroke:#616161;stroke-width:1.0;"/></g><!--link AgenteCUJ to join--><g id="link_AgenteCUJ_join"><path d="M450,675.7879 C450,698.8779 450,720.5279 450,730.0779 " fill="none" id="AgenteCUJ-to-join" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="450,736.0779,454,727.0779,450,731.0779,446,727.0779,450,736.0779" style="stroke:#616161;stroke-width:1.0;"/></g><!--link AgenteCUN to join--><g id="link_AgenteCUN_join"><path d="M633.96,675.9279 C567.22,698.9979 493.161,724.6083 465.611,734.1283 " fill="none" id="AgenteCUN-to-join" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="459.94,736.0879,469.7529,736.9291,464.6658,734.4549,467.14,729.3678,459.94,736.0879" style="stroke:#616161;stroke-width:1.0;"/></g><!--link join to Integracion--><g id="link_join_Integracion"><path d="M450,744.9879 C450,766.1979 450,873.6579 450,937.2679 " fill="none" id="join-to-Integracion" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="450,943.2679,454,934.2679,450,938.2679,446,934.2679,450,943.2679" style="stroke:#616161;stroke-width:1.0;"/></g><!--link Integracion to *end*--><g id="link_Integracion_*end*"><path d="M450,1031.9179 C450,1092.1579 450,1191.5479 450,1224.4979 " fill="none" id="Integracion-to-*end*" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="450,1230.4979,454,1221.4979,450,1225.4979,446,1221.4979,450,1230.4979" style="stroke:#616161;stroke-width:1.0;"/></g><!--SRC=[pLRBRjms5DthAoxIpKnY6uZpQEi61bJN1cpOWnP1iWcou50ScRQ6LoKf5ywg7z4Vw3BBeei2NNR-f5_ISwd7IBQB85qLOynGr7tnt7Ck7QwjgvLNQteTLJJViY-CF-AAFNtnV5y-MRXZelHrwRbnHMTsSYoVaLdkFV_KlNpvL3wZbmj-ACJ9oNV7Nzwr6jToydN-rVwBB8isLeQ-Lz5lVdTK6FnLfbHBMzb25VJtpxzGxZQ_LZROGBDQ1QONyonxz_WzxUuUqd7uiO53P3gWMZL1qRkItsTPa9DjtsPZE_POmw107HBVSP-qCXF3_6cNNrNsW_9KALBmjT7es7WriJN3-kBjOvgzjKX0V_r1H-oYvqgIfUSBHYwUPzF2iOucoF7LS5WOUuDimKOEY5yRRLLbGd-u5VjhUlLAVWuFkxqhjWvxyeEzKHB1IYopBBd9OruQ5ytHczFxMsVtjnPzsaVjJa96IpjGT8CV-uXK60KTLZZWqcZbBIUV0MgQvVlqXF9dyucjwj4-UYCGQ5xNE06UTQK2CCA909YFLjjQkKzLTJMfwcp8TFOPLPtzzwhszlOc1Io6e8j_As1YCMiSgVPaDTYgLQ6a0XWJL6Khr62WXYr-qZBf_gZuUrkBxLQM22EFftXLUgKj3zMFjqRhJobeQfe_dsgev_eTCysN9bYCW1rIckiAXqEnJBSWVlHDqXkL5IzLbKrSfNOCWonpc33aRNaPYLSZvHCTUIXMS0Od4DGBY5WEO-K0DiAPq9Dc0Y_LSFMelO31RQV3bTNo3CTP0Hh049ofFKUEjcQijrLhETL063ZDT-2sJcCWPIfuRPtbdR7Q0UYgSN90KJmWQTPDrMMyxGRTC8eG7-M0827kZc9u4m11L7lmGGlmZNcsibUAa7GwhfJhfa-2nxSAQWaNME1fdA9sfCckqX7VbyrQEPGDYew6tE26SE8OOD7El91U8Vw7ORfhD72Bm1wT5YWWWGlNOIhUFZm7SHiOZ_P50w2KW8fmkl6-VQPWoiPBcdbIPp1KeYi2APBYgh71R7xZBJgleOGjB3SgbSWIrrbNRluSb9X0IY70gfksmTimFpHsyn6HhenkeX1De4cD7gb6YDFYHqpdvnUe3W3uEILEWAq016E4SEK4G6QacoLAJrsIxjN2VkbOoKjhlCCvZ2j8H71N2cCPJyKGqXa_HmlT61GfpBh9frDOb5Yp2trdJO2EexVB9dBRm2eLaEodIXZVg99qT1ckm0hK9-utDa2sEodJGrpGgfO0KfZymz5tLnpkCAxDtivjsfrS5hl4ooiqNvfv3c9n6mlN_iEA4rgffJVtkPG_4mcZhfLa2KRY5Ef0I7YF69JlYsDURI-PVix3l2_O9IfiRviaaFw-4J9kFbRVoBH5FmAdlYObihinlaoIW8jfzMOL2B5ES7SH0P8Bi0GbTjAvj3VQj9fgonb8C5MCxTarcNAfKrLg0mgiG6R1GuEfNlsVfF8F]--></g></svg>