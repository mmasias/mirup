<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1276px" preserveAspectRatio="none" style="width:973px;height:1276px;background:#FFFFFF;" version="1.1" viewBox="0 0 973 1276" width="973px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="293" x="333.25" y="24.9659">Patr&#243;n de delegabilidad &#8212; Dise&#241;o (paso 6)</text><ellipse cx="447" cy="56.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><g id="Esqueleto"><rect fill="#FEFEFE" height="104.4444" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="271" x="311.5" y="257.1979"/><line style="stroke:#424242;stroke-width:0.5;" x1="311.5" x2="582.5" y1="286.2658" y2="286.2658"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66" x="414" y="277.1639">Esqueleto</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="163" x="316.5" y="304.0939">D1 &#8212; Dise&#241;ar la arquitectura</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159" x="316.5" y="320.438">orquestador &#8212; no delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="218" x="316.5" y="336.7822">stack tecnol&#243;gico &#183; nodos &#183; subsistemas</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="251" x="316.5" y="353.1263">mecanismos gen&#233;ricos &#183; vistas de despliegue</text></g><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="407" y="534.7779"/><rect fill="#555555" height="8" style="stroke:none;stroke-width:1.0;" width="80" x="407" y="736.5279"/><g id="AgenteCUI"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="270" x="7" y="603.7779"/><line style="stroke:#424242;stroke-width:0.5;" x1="7" x2="277" y1="632.8458" y2="632.8458"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157" x="63.5" y="623.7439">Agente &#8212; caso de uso i</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="172" x="12" y="650.6739">D2+D3 &#8212; becario &#8212; delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="250" x="12" y="667.018">dise&#241;ar CU &#183; completar clases con tecnolog&#237;a</text></g><g id="AgenteCUJ"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="270" x="312" y="603.7779"/><line style="stroke:#424242;stroke-width:0.5;" x1="312" x2="582" y1="632.8458" y2="632.8458"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157" x="368.5" y="623.7439">Agente &#8212; caso de uso j</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="172" x="317" y="650.6739">D2+D3 &#8212; becario &#8212; delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="250" x="317" y="667.018">dise&#241;ar CU &#183; completar clases con tecnolog&#237;a</text></g><g id="AgenteCUN"><rect fill="#FEFEFE" height="71.7561" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="229" x="617.5" y="603.7779"/><line style="stroke:#424242;stroke-width:0.5;" x1="617.5" x2="846.5" y1="632.8458" y2="632.8458"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="12" x="726" y="623.7439">...</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="172" x="622.5" y="650.6739">D2+D3 &#8212; becario &#8212; delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209" x="622.5" y="667.018">(un agente por cada CU del ramillete)</text></g><g id="Integracion"><rect fill="#FEFEFE" height="104.4444" rx="12.5" ry="12.5" style="stroke:#424242;stroke-width:0.5;" width="248" x="323" y="944.2179"/><line style="stroke:#424242;stroke-width:0.5;" x1="323" x2="571" y1="973.2858" y2="973.2858"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="78" x="408" y="964.1839">Integracion</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151" x="328" y="991.1139">D4 &#8212; Dise&#241;ar subsistemas</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159" x="328" y="1007.458">orquestador &#8212; no delegable</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="228" x="328" y="1023.8022">cohesi&#243;n y acoplamiento de subsistemas</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="205" x="328" y="1040.1463">interfaces &#183; promueve al consolidado</text></g><ellipse cx="447" cy="1259.3579" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="447" cy="1259.3579" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><g id="elem_GMN21"><path d="M617.5,145.0679 L617.5,305.4179 L582.78,309.4179 L617.5,313.4179 L617.5,473.7762 A0,0 0 0 0 617.5,473.7762 L966.5,473.7762 A0,0 0 0 0 966.5,473.7762 L966.5,155.0679 L956.5,145.0679 L617.5,145.0679 A0,0 0 0 0 617.5,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M956.5,145.0679 L956.5,155.0679 L966.5,155.0679 L956.5,145.0679 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307" x="623.5" y="163.9649">Criterio de entrada: modelo de an&#225;lisis del ramillete,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296" x="623.5" y="181.6709">casos de uso, requisitos no funcionales, requisitos</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244" x="623.5" y="199.377">especiales capturados en an&#225;lisis y pausa</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217" x="623.5" y="217.083">arquitect&#243;nica post-an&#225;lisis resuelta.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="623.5" y="234.789">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302" x="623.5" y="252.495">D1 es la pausa arquitect&#243;nica de m&#225;xima retenci&#243;n</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308" x="623.5" y="270.201">humana del pipeline: aqu&#237; se elige el stack (lenguaje,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321" x="623.5" y="287.907">framework, persistencia), decisi&#243;n que compromete al</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282" x="623.5" y="305.6131">ramillete y a los siguientes. El LLM senior puede</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253" x="623.5" y="323.3191">proponer; la decisi&#243;n la retiene el humano.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328" x="623.5" y="341.0251">Una vez fijado el stack, D2+D3 son derivaci&#243;n mec&#225;nica.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="623.5" y="358.7311">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137" x="623.5" y="376.4371">Sin esqueleto validado,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209" x="623.5" y="394.1431">ning&#250;n agente entra en derivaci&#243;n.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="623.5" y="411.8492">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="623.5" y="429.5552">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="623.5" y="447.2612">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="623.5" y="464.9672">las tres regiones del espacio de gobierno.</text></g><g id="elem_GMN24"><path d="M606,805.5279 L606,992.4479 L571.3,996.4479 L606,1000.4479 L606,1187.3543 A0,0 0 0 0 606,1187.3543 L926,1187.3543 A0,0 0 0 0 926,1187.3543 L926,815.5279 L916,805.5279 L606,805.5279 A0,0 0 0 0 606,805.5279 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><path d="M916,805.5279 L916,815.5279 L926,815.5279 L916,805.5279 " fill="#FFFDE7" style="stroke:#F9A825;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257" x="612" y="824.4249">Criterio de salida: casos de uso del ramillete</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262" x="612" y="842.1309">dise&#241;ados (clases completas con tecnolog&#237;a,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299" x="612" y="859.837">secuencias descritas), arquitectura de subsistemas</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254" x="612" y="877.543">y despliegue definida, requisitos especiales</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252" x="612" y="895.249">resueltos o pospuestos a implementaci&#243;n,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228" x="612" y="912.955">trazabilidad completa an&#225;lisis - dise&#241;o.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256" x="612" y="930.661">Listo para la pausa arquitect&#243;nica que abre</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100" x="612" y="948.367">implementaci&#243;n.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="612" y="966.0731">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285" x="612" y="983.7791">D3 no es fase separada: se ejecuta dentro de D2.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275" x="612" y="1001.4851">Al dise&#241;ar cada CU se completan las clases con</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283" x="612" y="1019.1911">tecnolog&#237;a; D4 consolida por convergencia en el</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272" x="612" y="1036.8971">diagrama de clases de dise&#241;o transversal, que</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145" x="612" y="1054.6031">crece con cada ramillete.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="612" y="1072.3092">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166" x="612" y="1090.0152">Sin integraci&#243;n completada,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="126" x="612" y="1107.7212">la disciplina no cierra.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="13" x="612" y="1125.4272">&#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="612" y="1143.1332">Qui&#233;n ejecuta dentro del orquestador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226" x="612" y="1160.8392">(humano o LLM senior) lo determinan</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245" x="612" y="1178.5453">las tres regiones del espacio de gobierno.</text></g><!--link *start* to Esqueleto--><g id="link_*start*_Esqueleto"><path d="M447,66.3079 C447,96.7379 447,189.3079 447,250.8979 " fill="none" id="*start*-to-Esqueleto" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="447,256.8979,451,247.8979,447,251.8979,443,247.8979,447,256.8979" style="stroke:#616161;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63" x="448" y="110.9649">pausa [go]</text></g><!--link Esqueleto to fork--><g id="link_Esqueleto_fork"><path d="M447,362.0079 C447,422.2779 447,510.1279 447,528.5679 " fill="none" id="Esqueleto-to-fork" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="447,534.5679,451,525.5679,447,529.5679,443,525.5679,447,534.5679" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteCUI--><g id="link_fork_AgenteCUI"><path d="M436.5,543.1779 C407.22,552.6679 327.8576,578.3977 256.6276,601.4877 " fill="none" id="fork-to-AgenteCUI" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="250.92,603.3379,260.7149,604.3677,255.6763,601.7961,258.248,596.7576,250.92,603.3379" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteCUJ--><g id="link_fork_AgenteCUJ"><path d="M447,543.0679 C447,552.4479 447,574.1579 447,597.3379 " fill="none" id="fork-to-AgenteCUJ" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="447,603.3379,451,594.3379,447,598.3379,443,594.3379,447,603.3379" style="stroke:#616161;stroke-width:1.0;"/></g><!--link fork to AgenteCUN--><g id="link_fork_AgenteCUN"><path d="M456.81,543.1779 C484.17,552.6679 557.9914,578.2815 624.5514,601.3715 " fill="none" id="fork-to-AgenteCUN" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="630.22,603.3379,623.0281,596.6092,625.4962,601.6992,620.4061,604.1673,630.22,603.3379" style="stroke:#616161;stroke-width:1.0;"/></g><!--link AgenteCUI to join--><g id="link_AgenteCUI_join"><path d="M250.82,675.9279 C321.99,699.0079 401.3127,724.7167 430.6927,734.2467 " fill="none" id="AgenteCUI-to-join" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="436.4,736.0979,429.0733,729.5162,431.644,734.5552,426.6049,737.1259,436.4,736.0979" style="stroke:#616161;stroke-width:1.0;"/></g><!--link AgenteCUJ to join--><g id="link_AgenteCUJ_join"><path d="M447,675.7879 C447,698.8879 447,720.5279 447,730.0879 " fill="none" id="AgenteCUJ-to-join" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="447,736.0879,451,727.0879,447,731.0879,443,727.0879,447,736.0879" style="stroke:#616161;stroke-width:1.0;"/></g><!--link AgenteCUN to join--><g id="link_AgenteCUN_join"><path d="M630.32,675.9279 C563.81,699.0079 490.0283,724.6007 462.5683,734.1307 " fill="none" id="AgenteCUN-to-join" style="stroke:#616161;stroke-width:1.0;"/><polygon fill="#616161" points="456.9,736.0979,466.714,736.926,461.6236,734.4586,464.091,729.3682,456.9,736.0979" style="stroke:#616161;stroke-width:1.0;"/></g><!--link join to Integracion--><g id="link_join_Int